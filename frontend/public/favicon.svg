<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: dark teal rounded square -->
  <rect width="32" height="32" rx="7" fill="#0d4a3a"/>

  <!-- Meeting table (top-down view, oval) -->
  <ellipse cx="16" cy="16" rx="7.5" ry="5" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>

  <!-- Seats around the table -->
  <!-- Top (booked — highlighted in green) -->
  <circle cx="16" cy="7.5" r="2.8" fill="#3dd68c"/>

  <!-- Bottom -->
  <circle cx="16" cy="24.5" r="2.5" fill="rgba(255,255,255,0.35)"/>

  <!-- Left -->
  <circle cx="6.5" cy="16" r="2.5" fill="rgba(255,255,255,0.35)"/>

  <!-- Right -->
  <circle cx="25.5" cy="16" r="2.5" fill="rgba(255,255,255,0.35)"/>
</svg>
